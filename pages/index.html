<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>正則値の逆像の接空間</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f7f4;
        --text: #171717;
        --muted: #5f6368;
        --line: #d7d7d2;
        --accent: #116149;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--background);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 64px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
        line-height: 1.35;
      }

      a {
        color: var(--accent);
        font-weight: 650;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      main {
        height: calc(100vh - 64px);
      }

      object {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .fallback {
        padding: 24px 20px;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        main {
          height: calc(100vh - 102px);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>正則値の逆像の接空間</h1>
      <a href="main.pdf">PDFを開く</a>
    </header>
    <main>
      <object data="main.pdf" type="application/pdf">
        <p class="fallback">
          PDFを表示できません。
          <a href="main.pdf">main.pdfを開いてください</a>。
        </p>
      </object>
    </main>
  </body>
</html>
